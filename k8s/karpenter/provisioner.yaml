# Karpenter NodePool and EC2NodeClass Configuration
# Provides cost-optimized autoscaling with intelligent instance selection
#
# Strategy:
# - Use Spot instances for stateless workloads (65%+ cost reduction)
# - Diversify across instance families to reduce interruption risk
# - Consolidation enabled to bin-pack and reduce waste
# - Disruption budgets to prevent over-aggressive scaling
---
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: default
  labels:
    app.kubernetes.io/part-of: kube-sre-stack
spec:
  template:
    metadata:
      labels:
        karpenter.sh/nodepool: default
        workload-type: general
    spec:
      requirements:
        # Instance category - prefer current gen, cost-effective families
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]

        # Instance generation - current gen only
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]

        # Capacity type - prefer Spot, fall back to On-Demand
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]

        # Architecture
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        # Instance sizes - avoid too small or too large
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["medium", "large", "xlarge", "2xlarge"]

      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: default

  # Disruption settings for cost optimization
  disruption:
    # Consolidate underutilized nodes
    consolidationPolicy: WhenUnderutilized
    # Allow empty nodes to be removed after 30s
    consolidateAfter: 30s
    # Expire nodes after 336h (14 days) to pick up new AMIs
    expireAfter: 336h

  # Limits to prevent runaway scaling
  limits:
    cpu: "200"
    memory: "400Gi"

  # Weight for scheduling preference (higher = preferred)
  weight: 50
---
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: spot-compute
  labels:
    app.kubernetes.io/part-of: kube-sre-stack
spec:
  template:
    metadata:
      labels:
        karpenter.sh/nodepool: spot-compute
        workload-type: batch
    spec:
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["large", "xlarge", "2xlarge", "4xlarge"]
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: default

      # Taint spot-only nodes so only tolerating workloads schedule here
      taints:
        - key: karpenter.sh/capacity-type
          value: spot
          effect: NoSchedule

  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s
    expireAfter: 168h # 7 days for batch nodes

  limits:
    cpu: "400"
    memory: "800Gi"

  weight: 100
---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
  labels:
    app.kubernetes.io/part-of: kube-sre-stack
spec:
  # AMI family - use EKS-optimized Amazon Linux 2023
  amiFamily: AL2023

  # Subnet discovery - find subnets tagged for Karpenter
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "kube-sre-stack-prod"

  # Security group discovery
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "kube-sre-stack-prod"

  # Instance profile for node IAM
  instanceProfile: "kube-sre-stack-prod-karpenter-node"

  # Block device mappings
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        encrypted: true
        deleteOnTermination: true

  # Metadata options (IMDSv2 required for security)
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required # IMDSv2 enforced

  # Tags for cost allocation and discovery
  tags:
    Environment: prod
    Project: kube-sre-stack
    ManagedBy: karpenter
    CostCenter: platform-engineering

  # User data for node bootstrapping
  userData: |
    #!/bin/bash
    # Enable containerd log rotation
    cat <<EOF > /etc/containerd/config.toml.d/log-rotation.toml
    [plugins."io.containerd.grpc.v1.cri"]
      max_container_log_line_size = 16384
    EOF
