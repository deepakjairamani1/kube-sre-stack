# AlertManager Configuration
# Routes alerts to appropriate channels based on severity and team ownership
# Implements escalation policies and deduplication

global:
  resolve_timeout: 5m
  slack_api_url_file: /etc/alertmanager/secrets/slack-webhook-url

# Inhibition rules - prevent lower-severity alerts when critical fires
inhibit_rules:
  # If a critical alert fires, suppress warning alerts for the same alertname+namespace
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, namespace]

  # If cluster is down, suppress all pod-level alerts
  - source_matchers:
      - alertname = KubeClusterUnreachable
    target_matchers:
      - severity =~ "warning|critical"

  # If node is down, suppress pod alerts on that node
  - source_matchers:
      - alertname = KubeNodeNotReady
    target_matchers:
      - severity = warning
    equal: [node]

# Routing tree
route:
  receiver: default-slack
  group_by: [alertname, namespace, service]
  group_wait: 30s       # Wait to batch initial alerts
  group_interval: 5m    # Wait before sending updates to a group
  repeat_interval: 4h   # Resend if still firing after this

  routes:
    # P1 - Critical infrastructure alerts → PagerDuty + Slack #incidents
    - receiver: pagerduty-critical
      matchers:
        - severity = critical
      group_wait: 10s         # Fast for critical
      repeat_interval: 1h
      continue: true          # Also send to Slack

    - receiver: slack-incidents
      matchers:
        - severity = critical
      group_wait: 10s

    # P2 - Warning alerts → Slack #alerts channel
    - receiver: slack-alerts
      matchers:
        - severity = warning
      group_wait: 1m
      repeat_interval: 8h

    # SLO burn rate alerts → dedicated SLO channel
    - receiver: slack-slo
      matchers:
        - type = slo_burn_rate
      group_by: [slo_name]
      group_wait: 30s
      repeat_interval: 2h

    # Cost alerts → Slack #cost-alerts
    - receiver: slack-cost
      matchers:
        - category = cost
      group_wait: 5m
      repeat_interval: 24h

    # Watchdog (dead man's switch) → separate receiver
    - receiver: watchdog
      matchers:
        - alertname = Watchdog
      repeat_interval: 1m

# Receivers
receivers:
  - name: default-slack
    slack_configs:
      - channel: "#platform-alerts"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        actions:
          - type: button
            text: "Runbook 📖"
            url: '{{ (index .Alerts 0).Annotations.runbook_url }}'
          - type: button
            text: "Dashboard 📊"
            url: '{{ (index .Alerts 0).Annotations.dashboard_url }}'
          - type: button
            text: "Silence 🔇"
            url: '{{ template "slack.silence_url" . }}'

  - name: pagerduty-critical
    pagerduty_configs:
      - service_key_file: /etc/alertmanager/secrets/pagerduty-service-key
        severity: critical
        description: '{{ template "pagerduty.description" . }}'
        details:
          firing: '{{ template "pagerduty.firing" . }}'
          num_firing: '{{ .Alerts.Firing | len }}'
          num_resolved: '{{ .Alerts.Resolved | len }}'

  - name: slack-incidents
    slack_configs:
      - channel: "#incidents"
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '🚨 [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: '{{ template "slack.critical.text" . }}'
        actions:
          - type: button
            text: "Acknowledge"
            url: '{{ template "slack.silence_url" . }}'
          - type: button
            text: "Runbook"
            url: '{{ (index .Alerts 0).Annotations.runbook_url }}'

  - name: slack-alerts
    slack_configs:
      - channel: "#platform-alerts"
        send_resolved: true
        color: warning
        title: '⚠️ [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: '{{ template "slack.text" . }}'

  - name: slack-slo
    slack_configs:
      - channel: "#slo-alerts"
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '🎯 SLO Budget Burn: {{ .CommonLabels.slo_name }}'
        text: '{{ template "slack.slo.text" . }}'

  - name: slack-cost
    slack_configs:
      - channel: "#cost-alerts"
        send_resolved: true
        title: '💰 Cost Alert: {{ .CommonLabels.alertname }}'
        text: '{{ template "slack.text" . }}'

  - name: watchdog
    webhook_configs:
      - url: "http://deadmansswitch.example.com/ping"

# Templates
templates:
  - /etc/alertmanager/templates/*.tmpl
