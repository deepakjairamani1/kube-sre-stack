# ApplicationSet: PiggyMetrics Multi-Environment Deployment
#
# Uses a Git Generator to automatically create ArgoCD Applications
# for each environment overlay (dev, prod).
#
# When a new overlay directory is added (e.g., staging/), ArgoCD
# automatically creates the corresponding Application — no manual work.
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: piggymetrics-environments
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/deepakjairamani1/kube-sre-stack.git
        revision: main
        directories:
          - path: k8s/apps/piggymetrics/overlays/*

  template:
    metadata:
      name: "piggymetrics-{{path.basename}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: piggymetrics
        environment: "{{path.basename}}"
      annotations:
        # Notifications on sync status
        notifications.argoproj.io/subscribe.on-sync-succeeded.slack: platform-deployments
        notifications.argoproj.io/subscribe.on-sync-failed.slack: platform-alerts
        notifications.argoproj.io/subscribe.on-health-degraded.slack: platform-alerts
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: piggymetrics
      source:
        repoURL: https://github.com/deepakjairamani1/kube-sre-stack.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "piggymetrics-{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      # Ignore differences that are set by controllers (HPA, etc.)
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        - group: autoscaling
          kind: HorizontalPodAutoscaler
          jsonPointers:
            - /spec/metrics
