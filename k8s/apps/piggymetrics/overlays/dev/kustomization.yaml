apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: piggymetrics-dev

resources:
  - ../../base

labels:
  - pairs:
      env: dev
    includeSelectors: false

patches:
  # Reduce gateway replicas to 1
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 125m
  # Reduce auth-service replicas to 1
  - target:
      kind: Deployment
      name: auth-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 125m
  # Reduce account-service replicas to 1
  - target:
      kind: Deployment
      name: account-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 125m
  # Reduce statistics-service replicas to 1
  - target:
      kind: Deployment
      name: statistics-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
  # Reduce notification-service replicas to 1
  - target:
      kind: Deployment
      name: notification-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
  # Reduce config-service replicas to 1
  - target:
      kind: Deployment
      name: config-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Reduce registry replicas to 1
  - target:
      kind: Deployment
      name: registry
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Remove HPAs in dev (scale to 0 minReplicas effectively disables)
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: gateway-hpa
    patch: |
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: gateway-hpa
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: auth-service-hpa
    patch: |
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: auth-service-hpa
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: account-service-hpa
    patch: |
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: account-service-hpa
