apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: piggymetrics
  labels:
    app.kubernetes.io/name: config-service
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: piggymetrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: config-service
      app.kubernetes.io/component: infrastructure
  template:
    metadata:
      labels:
        app.kubernetes.io/name: config-service
        app.kubernetes.io/component: infrastructure
        app.kubernetes.io/part-of: piggymetrics
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: config-service
          image: sqshq/piggymetrics-config
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
              name: http
              protocol: TCP
          env:
            - name: CONFIG_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: piggymetrics-secrets
                  key: config-service-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
