# =============================================================================
# PiggyMetrics Secrets
# =============================================================================
# PRODUCTION RECOMMENDATION:
# Use one of the following approaches for production secret management:
#
# Option 1: external-secrets-operator (recommended for AWS/GCP/Azure)
#   - Install: https://external-secrets.io/
#   - Create an ExternalSecret CR that syncs from AWS Secrets Manager,
#     GCP Secret Manager, or Azure Key Vault
#
# Option 2: sealed-secrets (recommended for GitOps workflows)
#   - Install: https://github.com/bitnami-labs/sealed-secrets
#   - Use kubeseal to encrypt secrets before committing to Git
#
# Option 3: Vault (HashiCorp)
#   - Use the Vault Agent Injector or CSI driver
#
# The Secret below is for DEVELOPMENT/TESTING ONLY.
# =============================================================================

# --- Example ExternalSecret (uncomment for production) ---
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: piggymetrics-secrets
#   namespace: piggymetrics
#   labels:
#     app.kubernetes.io/name: piggymetrics-secrets
#     app.kubernetes.io/part-of: piggymetrics
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: ClusterSecretStore
#   target:
#     name: piggymetrics-secrets
#     creationPolicy: Owner
#   data:
#     - secretKey: config-service-password
#       remoteRef:
#         key: piggymetrics/config-service-password
#     - secretKey: mongodb-password
#       remoteRef:
#         key: piggymetrics/mongodb-password
#     - secretKey: account-service-password
#       remoteRef:
#         key: piggymetrics/account-service-password
#     - secretKey: statistics-service-password
#       remoteRef:
#         key: piggymetrics/statistics-service-password
#     - secretKey: notification-service-password
#       remoteRef:
#         key: piggymetrics/notification-service-password

---
# =============================================================================
# WARNING: NOT FOR PRODUCTION - Development/Testing Secret Only
# =============================================================================
# Replace placeholder values with actual passwords for local development.
# NEVER commit real credentials to version control.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: piggymetrics-secrets
  namespace: piggymetrics
  labels:
    app.kubernetes.io/name: piggymetrics-secrets
    app.kubernetes.io/part-of: piggymetrics
  annotations:
    description: "Development-only secrets. Use external-secrets-operator or sealed-secrets in production."
type: Opaque
stringData:
  config-service-password: "CHANGE_ME_config_password"
  mongodb-password: "CHANGE_ME_mongodb_password"
  account-service-password: "CHANGE_ME_account_password"
  statistics-service-password: "CHANGE_ME_statistics_password"
  notification-service-password: "CHANGE_ME_notification_password"
