apiVersion: v1
kind: ServiceAccount
metadata:
  name: piggymetrics-gateway
  namespace: piggymetrics
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: piggymetrics
  annotations:
    # Uncomment and set ARN for AWS IRSA (IAM Roles for Service Accounts)
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/piggymetrics-gateway-role
---
apiVersion: v1
