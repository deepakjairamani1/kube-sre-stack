apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring
  namespace: piggymetrics
  labels:
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: piggymetrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: monitoring
      app.kubernetes.io/component: observability
  template:
    metadata:
      labels:
        app.kubernetes.io/name: monitoring
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: piggymetrics
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-config
          image: curlimages/curl:8.4.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until curl -sf http://config-service:8888/actuator/health; do
                echo "Waiting for config-service..."
                sleep 5
              done
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      containers:
        - name: monitoring
          image: sqshq/piggymetrics-monitoring
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
              name: http
              protocol: TCP
          env:
            - name: CONFIG_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: piggymetrics-secrets
                  key: config-service-password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
