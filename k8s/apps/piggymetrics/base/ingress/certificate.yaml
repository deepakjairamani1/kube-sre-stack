apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: piggymetrics-tls
  namespace: piggymetrics
  labels:
    app.kubernetes.io/name: piggymetrics-tls
    app.kubernetes.io/part-of: piggymetrics
spec:
  secretName: piggymetrics-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - piggymetrics.example.com
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: RSA
    size: 2048
