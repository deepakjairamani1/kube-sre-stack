# Alert Rules for Secrets Management
#
# Monitors External Secrets Operator health:
# - Sync failures (can't fetch from AWS)
# - Stale secrets (refresh not happening)
# - Store connectivity issues
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: secrets-management-alerts
  namespace: observability
  labels:
    release: kube-prometheus-stack
    app: kube-prometheus-stack
spec:
  groups:
    - name: external-secrets
      rules:
        - alert: ExternalSecretSyncFailed
          expr: |
            externalsecret_status_condition{condition="Ready", status="False"} == 1
          for: 5m
          labels:
            severity: critical
            category: security
          annotations:
            summary: "ExternalSecret {{ $labels.namespace }}/{{ $labels.name }} sync failed"
            description: "Secret sync from AWS Secrets Manager has been failing for 5 minutes. Pods may be using stale credentials."
            impact: "Services may fail auth when current credentials expire"
            action: "Check ESO logs: kubectl logs -n external-secrets -l app.kubernetes.io/name=external-secrets"
            runbook_url: "https://github.com/deepakjairamani1/kube-sre-stack/blob/main/docs/runbooks/secret-sync-failure.md"

        - alert: ExternalSecretStale
          expr: |
            (time() - externalsecret_status_condition_last_transition_time{condition="Ready", status="True"}) > 7200
          for: 10m
          labels:
            severity: warning
            category: security
          annotations:
            summary: "ExternalSecret {{ $labels.name }} hasn't refreshed in 2+ hours"
            description: "Secret was last synced {{ $value | humanizeDuration }} ago. Expected refresh interval is 1h."
            action: "Check if AWS Secrets Manager is accessible and IAM role is valid"

        - alert: ClusterSecretStoreUnhealthy
          expr: |
            clustersecretstore_status_condition{condition="Ready", status="False"} == 1
          for: 2m
          labels:
            severity: critical
            category: security
          annotations:
            summary: "ClusterSecretStore {{ $labels.name }} is unhealthy"
            description: "Cannot connect to AWS Secrets Manager. All ExternalSecrets using this store will fail to sync."
            impact: "No secrets can be refreshed. New deployments will fail if they need secrets."
            action: "Check IRSA role, AWS connectivity, and service account annotations"
