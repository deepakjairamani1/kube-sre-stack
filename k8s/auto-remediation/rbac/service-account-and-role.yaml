# RBAC for Auto-Remediation Jobs
#
# Principle of least privilege:
#   - Can LIST/GET pods (to detect issues)
#   - Can DELETE pods (to restart crashlooping)
#   - Can PATCH deployments (to scale)
#   - CANNOT create, cannot access secrets, cannot modify RBAC
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auto-remediation
  namespace: piggymetrics
  labels:
    app.kubernetes.io/name: auto-remediation
    app.kubernetes.io/part-of: kube-sre-stack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auto-remediation
  namespace: piggymetrics
  labels:
    app.kubernetes.io/name: auto-remediation
rules:
  # Read pods to detect CrashLoopBackOff
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]

  # Read pod logs for diagnostic context
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  # Scale deployments up/down
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]

  # Read deployments/scale subresource
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]

  # Read events for context
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]

  # Read ReplicaSets (to find pod owners)
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auto-remediation
  namespace: piggymetrics
  labels:
    app.kubernetes.io/name: auto-remediation
subjects:
  - kind: ServiceAccount
    name: auto-remediation
    namespace: piggymetrics
roleRef:
  kind: Role
  name: auto-remediation
  apiGroup: rbac.authorization.k8s.io
---
# ConfigMap holding all remediation scripts
apiVersion: v1
kind: ConfigMap
metadata:
  name: auto-remediation-scripts
  namespace: piggymetrics
  labels:
    app.kubernetes.io/name: auto-remediation
data:
  auto-restart-crashloop.sh: |
    # Loaded from k8s/auto-remediation/scripts/auto-restart-crashloop.sh
    # Use Kustomize configMapGenerator with files in production
  auto-scale-on-latency.sh: |
    # Loaded from k8s/auto-remediation/scripts/auto-scale-on-latency.sh
    # Use Kustomize configMapGenerator with files in production
