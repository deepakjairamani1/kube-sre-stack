# ClusterSecretStore — Cluster-wide connection to AWS Secrets Manager
#
# This is the "bridge" between ExternalSecret resources and AWS.
# Namespaced ExternalSecrets reference this store to fetch values.
#
# Using ClusterSecretStore (not SecretStore) because:
#   - One store serves all namespaces
#   - Less duplication (don't need per-namespace stores)
#   - Centralized IAM control
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: kube-sre-stack
    app.kubernetes.io/managed-by: argocd
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# ClusterSecretStore for AWS Parameter Store (for non-sensitive config)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
  labels:
    app.kubernetes.io/part-of: kube-sre-stack
    app.kubernetes.io/managed-by: argocd
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
