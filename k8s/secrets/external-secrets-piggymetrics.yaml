# ExternalSecrets for PiggyMetrics
#
# Each ExternalSecret:
#   1. References the ClusterSecretStore (aws-secrets-manager)
#   2. Specifies which AWS secret to fetch (by path)
#   3. Creates a K8s Secret with the fetched values
#   4. Auto-refreshes every 1h (catches rotated credentials)
#
# AWS Secrets Manager path convention:
#   kube-sre-stack/{env}/piggymetrics/{service-name}
#
# Example AWS secret value (JSON):
#   {"username": "admin", "password": "s3cr3t", "host": "mongodb.example.com"}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: piggymetrics-mongodb
  namespace: piggymetrics
  labels:
    app.kubernetes.io/part-of: piggymetrics
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: piggymetrics-mongodb-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Template allows transforming the secret data
        MONGODB_URI: "mongodb://{{ .username }}:{{ .password }}@mongodb-0.mongodb.piggymetrics.svc.cluster.local:27017,mongodb-1.mongodb.piggymetrics.svc.cluster.local:27017,mongodb-2.mongodb.piggymetrics.svc.cluster.local:27017/?replicaSet=rs0"
        MONGODB_USERNAME: "{{ .username }}"
        MONGODB_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: kube-sre-stack/piggymetrics/mongodb
        property: username
    - secretKey: password
      remoteRef:
        key: kube-sre-stack/piggymetrics/mongodb
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: piggymetrics-auth
  namespace: piggymetrics
  labels:
    app.kubernetes.io/part-of: piggymetrics
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: piggymetrics-auth-credentials
    creationPolicy: Owner
  data:
    - secretKey: CONFIG_SERVICE_PASSWORD
      remoteRef:
        key: kube-sre-stack/piggymetrics/config-service
        property: password
    - secretKey: ACCOUNT_SERVICE_PASSWORD
      remoteRef:
        key: kube-sre-stack/piggymetrics/account-service
        property: password
    - secretKey: STATISTICS_SERVICE_PASSWORD
      remoteRef:
        key: kube-sre-stack/piggymetrics/statistics-service
        property: password
    - secretKey: NOTIFICATION_SERVICE_PASSWORD
      remoteRef:
        key: kube-sre-stack/piggymetrics/notification-service
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: piggymetrics-rabbitmq
  namespace: piggymetrics
  labels:
    app.kubernetes.io/part-of: piggymetrics
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: piggymetrics-rabbitmq-credentials
    creationPolicy: Owner
  data:
    - secretKey: RABBITMQ_DEFAULT_USER
      remoteRef:
        key: kube-sre-stack/piggymetrics/rabbitmq
        property: username
    - secretKey: RABBITMQ_DEFAULT_PASS
      remoteRef:
        key: kube-sre-stack/piggymetrics/rabbitmq
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: piggymetrics-notification-smtp
  namespace: piggymetrics
  labels:
    app.kubernetes.io/part-of: piggymetrics
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: piggymetrics-smtp-credentials
    creationPolicy: Owner
  data:
    - secretKey: SMTP_HOST
      remoteRef:
        key: kube-sre-stack/piggymetrics/smtp
        property: host
    - secretKey: SMTP_USER
      remoteRef:
        key: kube-sre-stack/piggymetrics/smtp
        property: username
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: kube-sre-stack/piggymetrics/smtp
        property: password
