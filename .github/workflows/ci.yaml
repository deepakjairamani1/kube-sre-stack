# CI Pipeline — Validates infrastructure code on every PR
#
# Jobs run in parallel where possible:
#   lint → (terraform-validate, k8s-validate, security-scan)
#
# Triggers on:
#   - Pull requests to main (validate before merge)
#   - Push to main (post-merge validation)
name: CI Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "terragrunt/**"
      - "k8s/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "terragrunt/**"
      - "k8s/**"

env:
  TF_VERSION: "1.7.0"
  TERRAGRUNT_VERSION: "0.55.0"
  KUBECONFORM_VERSION: "0.6.4"

jobs:
  lint:
    name: "🧹 Lint & Format Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: |
          echo "## Terraform Format Check" >> $GITHUB_STEP_SUMMARY
          if terraform fmt -check -recursive terraform/; then
            echo "✅ All files formatted correctly" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Files need formatting. Run: terraform fmt -recursive terraform/" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: k8s/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                check-keys: false
              comments:
                min-spaces-from-content: 1

  terraform-validate:
    name: "🏗️ Terraform Validate"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        module: [vpc, eks, observability, ingress]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/modules/${{ matrix.module }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform/modules/${{ matrix.module }}
        run: |
          terraform validate
          echo "✅ Module **${{ matrix.module }}** validated successfully" >> $GITHUB_STEP_SUMMARY

  terraform-plan:
    name: "📋 Terraform Plan (Dev)"
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ env.TERRAGRUNT_VERSION }}

      - name: Terragrunt Plan (Dev)
        working-directory: terragrunt/env/dev
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          terragrunt run-all plan --terragrunt-non-interactive -out=tfplan 2>&1 | tee plan_output.txt

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terragrunt/env/dev/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n\n... (truncated)' : plan;
            
            const body = `## 📋 Terraform Plan (Dev Environment)
            
            <details>
            <summary>Show Plan Output</summary>
            
            \`\`\`hcl
            ${truncated}
            \`\`\`
            
            </details>
            
            *Pushed by @${{ github.actor }}*`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
